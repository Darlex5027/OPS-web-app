<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8"> <!-- Soporte para caracteres especiales como ñ y tildes -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Adaptación a móviles -->
    <title>Administación de Vacantes</title>
    <link rel="stylesheet" href="../css/prueba.css">
</head>

<body class="pagina-vacantes">
    <div class="sidebar">
        <div class="profile">
            <img src="../Imagenes/prueba.png" alt="perfil">
            <h3>Mtra. M. Guadalupe</h3>
        </div>
        <div class="menu">
            <a href="foro_vacantes.html">
                <button>Publicar vacantes para servicio social</button>
            </a>
            <a href="admin_alumnos.html">
                <button>Administrar alumnos</button>
            </a>
            <a href="reportes_alumnos.html">
                <button>Generar reporte de alumnos</button>
            </a>
            <a href="reportes_estadisticos.html">
                <button>Generar reporte estadistico</button>
            </a>
            <a href="digitalizar_evaluacones.html">
                <button>Llenar formularios del prestador</button>
            </a>
            <a href="reportes_prestadores.html">
                <button>Generar reporte del prestador</button>
            </a>
            <a href="admin_encuentas.html">
                <button>Editar formularios</button>
            </a>
            <a href="Mensajes.html">
                <button>Mensajes</button>
            </a>
            <a href="perfil.html">
                <button>perfil</button>
            </a>
        </div>
    </div>
    <div class="main">
        <div class="header">
            <div></div>
            <h1>Administación de vacantes</h1>
            <div class="header-logo-right">
                <img src="../Imagenes/Logo.png" alt="Logo OPS">
            </div>
        </div>
        <div class="table">
            <form id="miFormulario">
                <label>Selecciona una categoría:</label>

                <select id="opciones" onchange="cambiarContenido()">
                    <option value="manual">Registro manual</option>
                    <option value="flayer">Registro con flayer</option>
                </select>
                <div id="registro_manual" style="display:none;">
                    <label for="titulo_manual">Titulo: </label>
                    <input type="text" id="titulo_manual" placeholder="Titulo" required>




                    <div id="contenedor_empresa">
                        <label for="empresa">Empresa:</label>
                        <select id="empresa_manual">
                            <option value="">-- Cargando empresas... --</option>
                        </select>
                        <button type="button" id="btn-activar-nueva" onclick="mostrarFormularioNuevo()">+ Crear Nueva</button>

                        <div id="nueva_empresa">
                            <label for="nombre_empresa">Nombre: </label>
                            <input type="text" id="nombre_empresa" placeholder="Nombre de la empresa" >
                            <label for="descripcion_empresa">Descripcion: </label>
                            <input type="text" id="descripcion_empresa" placeholder="Descripcion de la empresa" >
                            <label for="razon_empresa">Razón social: </label>
                            <input type="text" id="razon_empresa" placeholder="Razón social">
                            <label for="rfc_empresa">RFC: </label>
                            <input type="text" id="rfc_empresa" maxlength="13" pattern="[A-ZÑa-zñ0-9]{12,13}" title="El RFC debe tener entre 12 y 13 caracteres alfanuméricos" placeholder="Ej: ABC123456XYZ">
                            <label for="nombre_contacto">Dirección: </label>
                            <input type="text" id="direccion_empresa" placeholder="Dirección de la empresa">
                            <label for="nombre_contacto">Sitio web: </label>
                            <input type="text" id="web_empresa" placeholder="Sitio web">
                            <button type="button" onclick="cancelarRegistro()">Cancelar y elegir existente</button>
                        </div>

                    </div>


                    <label for="servicio">servicio: </label>
                    <select id="servicio_manual">
                        <option value="2">Practicas profesionales</option>
                        <option value="1">Servicio social</option>
                    </select>

                    <label for="nombre_contacto">Nombre del contacto: </label>
                    <input type="text" id="nombre_contacto" placeholder="Nombre del contacto" required>
                    <label for="email">Contacto e-mail: </label>
                    <input type="email" id="email" placeholder="Contacto e-mail" required>
                    <label for="telefono">Contacto telefono: </label>
                    <input type="tel" maxlength="10" pattern="[0-9]*" id="telefono" placeholder="Contacto telefono" required>
                    <label for="descripcion">Descripcion: </label>
                    <input type="text" id="descripcion" placeholder="descripcion" required>
                    <label for="requisitos">Requisitos: </label>
                    <input type="text" id="requisitos" placeholder="requisitos" required>

                    <label id="fecha_Manual"></label>
                    <label for="expiracion">Fecha de expiracion: </label>
                    <input type="date" id="expiracion_manual" placeholder="Fecha de expiracion" required>
                </div>

                <div id="registro_flayer" style="display: none;">
                    <label for="titulo_flayer">Titulo: </label>
                    <input type="text" id="titulo_flayer" placeholder="Titulo">
                    <label for="titulo">Flayer: </label>
                    <input type="file" id="flayer" placeholder="flayer">
                    <label for="empresa">Empresa:</label>
                    <select id="empresa_flayer">
                        <option value="">-- Cargando empresas... --</option>
                    </select>

                    <label for="servicio">servicio: </label>
                    <select id="servicio_flayer">
                        <option value="2">Practicas profecionales</option>
                        <option value="1">Servicio social</option>
                    </select>

                    <label id="fecha_flayer"></label>
                    <label for="expiracion">Fecha de expiracion: </label>
                    <input type="date" id="expiracion_flayer" placeholder="Fecha de expiracion">
                </div>
                <script src="mostrar_contenido.js"></script>


                <button type="submit" id="btnEnviar">Enviar</button>
            </form>
            <script src="enviar_vacantes.js"></script>
        </div>
        <div id="toast-mensaje" class="toast oculto"></div>
    </div>
</body>

</html>
