<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Login</title>

</head>

<body>

<h2>Iniciar sesión</h2>

<form id="formLogin">

<input 
type="text" 
id="matricula" 
placeholder="Matrícula" 
maxlength="8"
required>

<input 
type="password" 
id="password" 
placeholder="Contraseña" 
required>

<button type="submit">Iniciar sesión</button>

</form>

<p id="mensaje" style="display:none;"></p>

<p>
¿No tienes cuenta?
<a href="registro.html">Regístrate</a>
</p>

<script src="js/login.js"></script>

</body>

</html>
