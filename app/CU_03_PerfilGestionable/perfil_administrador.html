<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8"> <!-- Soporte para caracteres especiales como ñ y tildes -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Adaptación a móviles -->
    <title>Perfil gestionable</title>
    <link rel="stylesheet" href="../css/prueba_perfil.css">
</head>

<body>
    <div class="sidebar">
        <div class="profile">
            <img src="../Imagenes/prueba.png" alt="perfil">
            <h3>Mtra. M. Guadalupe</h3>
        </div>
        <div class="menu">
            <a href="foro_vacantes.html">
                <button>Publicar vacantes para servicio social</button>
            </a>
            <a href="admin_alumnos.html">
                <button>Administrar alumnos</button>
            </a>
            <a href="reportes_alumnos.html">
                <button>Generar reporte de alumnos</button>
            </a>
            <a href="reportes_estadisticos.html">
                <button>Generar reporte estadistico</button>
            </a>
            <a href="digitalizar_evaluacones.html">
                <button>Llenar formularios del prestador</button>
            </a>
            <a href="reportes_prestadores.html">
                <button>Generar reporte del prestador</button>
            </a>
            <a href="admin_encuentas.html">
                <button>Editar formularios</button>
            </a>
            <a href="Mensajes.html">
                <button>Mensajes</button>
            </a>
            <a href="perfil.html">
                <button>Perfil</button>
            </a>
        </div>
    </div>
    <div class="main">
        <div class="header">
            <div></div>
            <h1>Perfil</h1>
            <div class="header-logo-right">
                <img src="../Imagenes/Logo.png" alt="Logo OPS">
            </div>
            <div class="header-logo-left">
                <img src="../Imagenes/FCBIyT.png" alt="Logo Facultad">
            </div>
        </div>
        <div class="table">
            <div class="table">
                <form class="perfil-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="nombre">Nombre</label>
                            <input type="text" id="nombre" name="nombre" placeholder="">
                        </div>

                        <div class="form-group">
                            <label for="telefono">Teléfono</label>
                            <input type="text" id="telefono" name="telefono" placeholder="">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="no_empleado">No. empleado</label>
                            <input type="text" id="no_empleado" name="no_empleado" placeholder="">
                        </div>

                        <div class="form-group">
                            <label for="correo">Correo</label>
                            <input type="email" id="correo" name="correo" placeholder="">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="carrera">Carrera a cargo</label>
                            <input type="text" id="carrera" name="carrera" placeholder="">
                        </div>
                    </div>
                </form>
            </div>
            <div class="form-actions">
                <button type="button" class="btn editar">Editar</button>
                <button type="submit" class="btn guardar">Guardar</button>
            </div>
        </div>
    </div>
</body>

</html>
