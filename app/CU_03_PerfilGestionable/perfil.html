<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil gestionable</title>
    <link rel="stylesheet" href="../css/prueba.css">
</head>

<body>

    <div class="sidebar">
        <div class="profile">
            <img id="foto_perfil" src="../Imagenes/prueba.png" alt="perfil">
        </div>

        <div class="menu">
            <a href="../CU_06_PublicarVacantes/admin_vacantes.html"><button>Publicar Vacantes</button></a>
            <a href="../CU_07_AdministrarAlumnos/admin_alumnos.html"><button>Administrar alumnos</button></a>
            <a href="../CU_08_Reporte_Alumnado/reporte_alumnos.html"><button>Generar reporte</button></a>
            <a href="#"><button>Reportes</button></a>
            <a href="#"><button>Formularios</button></a>
            <a href="#"><button>Prestador</button></a>
            <a href="#"><button>Editar formularios</button></a>
            <a href="../CU_03_PerfilGestionable/perfil.html"><button>Perfil</button></a>
        </div>
    </div>

    <div class="main">

        <div class="header">
            <div></div>
            <h1>Perfil</h1>
            <div class="header-logo-right">
                <img src="../Imagenes/Logo.png" alt="Logo OPS">
            </div>
        </div>

        <div class="table">

            <!-- ================= ADMIN ================= -->
            <form id="perfil_administrador">

                <label>Nombre</label>
                <input type="text" id="nombre_administrador" disabled readonly>

                <label>Apellido Paterno</label>
                <input type="text" id="apellido_paterno_administrador" disabled readonly>

                <label>Apellido Materno</label>
                <input type="text" id="apellido_materno_administrador" disabled readonly>

                <label>Carrera</label>
                <input type="text" id="id_carrera_administrador" disabled readonly>

                <label>Teléfono</label>
                <input type="text" id="telefono_administrador" disabled>

                <label>Correo</label>
                <input type="email" id="correo_administrador" disabled>

                <label>Fecha Registro</label>
                <input type="date" id="fecha_registro_administrador" disabled readonly>

            </form>

            <!-- ================= ALUMNO ================= -->
            <div class="contenedor-alumno">

                <!-- PERFIL -->
                <form id="perfil_alumno">
                    <h3>Perfil Alumno</h3>

                    <label>Nombre</label>
                    <input type="text" id="nombre_alumno" disabled readonly>

                    <label>Apellido Paterno</label>
                    <input type="text" id="apellido_paterno_alumno" disabled readonly>

                    <label>Apellido Materno</label>
                    <input type="text" id="apellido_materno_alumno" disabled readonly>

                    <label>Carrera</label>
                    <input type="text" id="id_carrera_alumno" disabled readonly>

                    <label>Grupo</label>
                    <input type="text" id="grupo_alumno" disabled>

                    <label>No. Expediente</label>
                    <input type="text" id="no_expediente_alumno" disabled readonly>

                    <label>Horario</label>
                    <div style="display:flex; gap:8px; align-items:center;">
                        <input type="time" id="horario_entrada" disabled>
                        <span>-</span>
                        <input type="time" id="horario_salida" disabled>
                    </div>

                    <label>Fecha Registro</label>
                    <input type="date" id="fecha_registro_alumno" disabled readonly>
                </form>

                <!-- ACTIVIDADES -->
                <form id="actividades_alumnos">
                    <h3>Actividades</h3>

                    <label>Servicio Alumno</label>
                    <input type="text" id="id_alumno_servicio" disabled readonly>

                    <label>Alumno</label>
                    <input type="text" id="id_alumno" disabled readonly>

                    <label>Servicio</label>
                    <input type="text" id="id_servicio" disabled>

                    <!-- 🔥 EMPRESA MEJORADA -->
                    <label>Empresa</label>

                    <!-- Vista normal -->
                    <input type="text" id="empresa_texto" disabled readonly>

                    <!-- Edición -->
                    <select id="id_empresa" style="display:none;">
                        <option value="">-- Seleccionar empresa --</option>
                        <option value="nueva">+ Agregar nueva empresa</option>
                    </select>

                    <!-- Nueva empresa -->
                    <input type="text" id="nueva_empresa" placeholder="Escribe nueva empresa" style="display:none;">

                    <label>Área</label>
                    <input type="text" id="area" disabled>

                    <label>Programa</label>
                    <input type="text" id="programa" disabled>

                    <label>Estado</label>
                    <select id="estado" disabled>
                        <option value="">-- Seleccionar --</option>
                        <option value="PENDIENTE">Pendiente</option>
                        <option value="EN_CURSO">En Curso</option>
                        <option value="COMPLETADO">Completado</option>
                    </select>

                    <label>Periodo Tipo</label>
                    <input type="text" id="periodo_tipo" disabled readonly>

                    <label>Periodo Año</label>
                    <input type="text" id="periodo_año" disabled>

                    <label>Fecha Inicio</label>
                    <input type="date" id="fecha_inicio" disabled>

                    <label>Fecha Fin</label>
                    <input type="date" id="fecha_fin" disabled>

                    <label>Fecha Registro</label>
                    <input type="date" id="fecha_registro" disabled readonly>

                    <label>Fecha Modificación</label>
                    <input type="date" id="fecha_modificacion" disabled readonly>
                </form>

            </div>

            <!-- FOTO -->
            <div class="subir-foto">
                <h3>Foto de perfil</h3>
                <input type="file" id="input_foto" accept="image/*">
            </div>

        </div>

        <div class="form-actions">
            <button type="button" class="btn editar">Editar</button>
            <button type="button" class="btn guardar">Guardar</button>
        </div>

        <!-- Toast -->
        <div id="toast-mensaje" class="toast oculto"></div>

    </div>

    <script src="mostrar_contenido.js"></script>
    <script src="../js/redireccion.js"></script>

</body>

</html>
