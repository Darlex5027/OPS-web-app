<!--
================================
Archivo : perfil.html
Autor   : Viridiana Tonix Zarate
Fecha   : 2026-05-24
Desc.   : Estructura HTML del módulo
         de perfil de usuario con
         secciones de admin y alumno.
         Cada tabla tiene sus propios
         botones Editar/Guardar/Cancelar.
================================
-->
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil gestionable</title>
    <link rel="stylesheet" href="../css/StyleCaso_3.css">
</head>

<body>
    <div class="sidebar">
        <div class="profile">
            <img id="foto_perfil_preview" src="../Imagenes/prueba.png" alt="perfil">
            <input type="file" id="foto_perfil_input" accept="image/jpeg,image/png,image/webp" hidden disabled>
            <button id="btn_cambiar_foto" class="oculto" type="button">📷 Cambiar foto</button>
        </div>
        <div class="menu"></div>
    </div>

    <div class="main">
        <div class="header">
            <div class="header-logo-right">
                <img src="../Imagenes/Logo.png" alt="Logo OPS">
            </div>
            <h1>Perfil</h1>
            <div class="header-spacer"></div>
        </div>

        <div class="table">

            <!-- ================= ADMIN ================= -->
            <form id="perfil_administrador">
                <label for="nombre_administrador">Nombre</label>
                <input type="text" id="nombre_administrador" disabled readonly>
                <label for="apellido_paterno_administrador">Apellido Paterno</label>
                <input type="text" id="apellido_paterno_administrador" disabled readonly>
                <label for="apellido_materno_administrador">Apellido Materno</label>
                <input type="text" id="apellido_materno_administrador" disabled readonly>
                <label for="id_carrera_administrador">Carrera</label>
                <input type="text" id="id_carrera_administrador" disabled readonly>
                <label for="telefono_administrador">Teléfono</label>
                <input type="text" id="telefono_administrador" maxlength="12" placeholder="555-4707-488"
                    pattern="[0-9]{3}-[0-9]{4}-[0-9]{3}" title="Formato: 555-4807-588" disabled>
                <label for="correo_administrador">Correo</label>
                <input type="email" id="correo_administrador" placeholder="correo@ejemplo.com"
                    pattern="^[^\s@]+@[^\s@]+\.(com|mx)$" title="Debe contener @ y terminar en .com o .mx" disabled>
                <label for="fecha_registro_administrador">Fecha Registro</label>
                <input type="date" id="fecha_registro_administrador" disabled readonly>
            </form>
            <!-- Botones Admin -->
            <div class="form-actions" id="acciones_admin">
                <button type="button" id="btn_editar_admin" class="btn editar">Editar</button>
                <button type="button" id="btn_guardar_admin" class="btn guardar" style="display:none">Guardar</button>
                <button type="button" id="btn_cancelar_admin" class="btn cancelar" style="display:none">Cancelar</button>
            </div>

            <!-- ================= ALUMNO ================= -->
            <div class="contenedor-alumno">

                <!-- PERFIL ALUMNO -->
                <div id="tabla_perfil_alumno">
                    <form id="perfil_alumno">
                        <h3>Perfil Alumno</h3>
                        <label for="nombre_alumno">Nombre</label>
                        <input type="text" id="nombre_alumno" disabled readonly>
                        <label for="apellido_paterno_alumno">Apellido Paterno</label>
                        <input type="text" id="apellido_paterno_alumno" disabled readonly>
                        <label for="apellido_materno_alumno">Apellido Materno</label>
                        <input type="text" id="apellido_materno_alumno" disabled readonly>
                        <label for="id_carrera_alumno">Carrera</label>
                        <input type="text" id="id_carrera_alumno" disabled readonly>
                        <label for="grupo_alumno">Semestre y Grupo</label>
                        <input type="text" id="grupo_alumno" maxlength="2" title="Formato válido: 1A, 2B, 3C..." disabled>
                        <label for="no_expediente_alumno">No. Expediente</label>
                        <input type="text" id="no_expediente_alumno" disabled readonly>
                        <label>Horario</label>
                        <div class="horario-container">
                            <input type="time" id="horario_entrada" disabled>
                            <span>-</span>
                            <input type="time" id="horario_salida" disabled>
                        </div>
                        <label for="fecha_registro_alumno">Fecha Registro</label>
                        <input type="date" id="fecha_registro_alumno" disabled readonly>
                    </form>
                    <!-- Botones Perfil Alumno -->
                    <div class="form-actions" id="acciones_perfil_alumno">
                        <button type="button" id="btn_editar_perfil" class="btn editar">Editar</button>
                        <button type="button" id="btn_guardar_perfil" class="btn guardar" style="display:none">Guardar</button>
                        <button type="button" id="btn_cancelar_perfil" class="btn cancelar" style="display:none">Cancelar</button>
                    </div>
                </div>

                <!-- ACTIVIDADES (Servicio Social / primer actividad) -->
                <div id="tabla_actividades">
                    <form id="actividades_alumnos">
                        <h3>Actividades</h3>
                        <label for="servicio">Servicio</label>
                        <input type="text" id="servicio" disabled>
                        <label for="empresa_texto">Empresa</label>
                        <input type="text" id="empresa_texto" disabled readonly>
                        <select id="id_empresa" class="oculto">
                            <option value="">-- Selecciona una empresa --</option>
                        </select>
                        <button type="button" id="btn_crear_empresa" class="btn crear oculto">+ Crear Nueva Empresa</button>
                        <label for="area">Área</label>
                        <input type="text" id="area" disabled>
                        <label for="programa">Programa</label>
                        <input type="text" id="programa" disabled>
                        <label for="estado">Estado</label>
                        <select id="estado" disabled>
                            <option value="">-- Seleccionar --</option>
                            <option value="PENDIENTE">Pendiente</option>
                            <option value="EN_CURSO">En_Curso</option>
                            <option value="COMPLETADO">Completado</option>
                        </select>
                        <label for="periodo_tipo">Periodo Tipo</label>
                        <input type="text" id="periodo_tipo" disabled readonly>
                        <label for="periodo_año">Periodo Año</label>
                        <input type="text" id="periodo_año" disabled>
                        <label for="fecha_inicio">Fecha Inicio</label>
                        <input type="date" id="fecha_inicio" disabled>
                        <label for="fecha_fin">Fecha Fin</label>
                        <input type="date" id="fecha_fin" disabled>
                        <label for="fecha_registro">Fecha Registro</label>
                        <input type="date" id="fecha_registro" disabled readonly>
                        <label for="fecha_modificacion">Fecha Modificación</label>
                        <input type="date" id="fecha_modificacion" disabled readonly>
                    </form>
                    <!-- Botones Actividades -->
                    <div class="form-actions" id="acciones_act">
                        <button type="button" id="btn_editar_act" class="btn editar">Editar</button>
                        <button type="button" id="btn_guardar_act" class="btn guardar" style="display:none">Guardar</button>
                        <button type="button" id="btn_cancelar_act" class="btn cancelar" style="display:none">Cancelar</button>
                    </div>
                </div>

            </div><!-- fin contenedor-alumno -->

            <!-- ACTIVIDADES 2 (segunda actividad si aplica) -->
            <div class="contenedor-actividades-2">
                <form id="actividades_alumnos_2">
                    <h3>Actividades</h3>
                    <label for="servicio_2">Servicio</label>
                    <input type="text" id="servicio_2" disabled>
                    <label for="empresa_texto_2">Empresa</label>
                    <input type="text" id="empresa_texto_2" disabled readonly>
                    <select id="id_empresa_2" class="oculto">
                        <option value="">-- Selecciona una empresa --</option>
                    </select>
                    <button type="button" id="btn_crear_empresa_2" class="btn crear oculto">+ Crear Nueva Empresa</button>
                    <label for="area_2">Área</label>
                    <input type="text" id="area_2" disabled>
                    <label for="programa_2">Programa</label>
                    <input type="text" id="programa_2" disabled>
                    <label for="estado_2">Estado</label>
                    <select id="estado_2" disabled>
                        <option value="">-- Seleccionar --</option>
                        <option value="PENDIENTE">Pendiente</option>
                        <option value="EN_CURSO">En_Curso</option>
                        <option value="COMPLETADO">Completado</option>
                    </select>
                    <label for="periodo_tipo_2">Periodo Tipo</label>
                    <input type="text" id="periodo_tipo_2" disabled readonly>
                    <label for="periodo_año_2">Periodo Año</label>
                    <input type="text" id="periodo_año_2" disabled>
                    <label for="fecha_inicio_2">Fecha Inicio</label>
                    <input type="date" id="fecha_inicio_2" disabled>
                    <label for="fecha_fin_2">Fecha Fin</label>
                    <input type="date" id="fecha_fin_2" disabled>
                    <label for="fecha_registro_2">Fecha Registro</label>
                    <input type="date" id="fecha_registro_2" disabled readonly>
                    <label for="fecha_modificacion_2">Fecha Modificación</label>
                    <input type="date" id="fecha_modificacion_2" disabled readonly>
                </form>
                <!-- Botones Actividades 2 -->
                <div class="form-actions" id="acciones_act_2">
                    <button type="button" id="btn_editar_act_2" class="btn editar">Editar</button>
                    <button type="button" id="btn_guardar_act_2" class="btn guardar" style="display:none">Guardar</button>
                    <button type="button" id="btn_cancelar_act_2" class="btn cancelar" style="display:none">Cancelar</button>
                </div>
            </div>

            <!-- ================= PRÁCTICAS PROFESIONALES ================= -->
            <!-- Se muestra automáticamente cuando el alumno llega a semestre 9 -->
            <div id="contenedor-practicas" class="oculto">
                <form id="practicas_profesionales">
                    <h3>Actividades</h3>
                    <label for="pp_servicio">Servicio</label>
                    <input type="text" id="pp_servicio" value="Prácticas Profesionales" disabled>
                    <label for="pp_empresa_texto">Empresa</label>
                    <input type="text" id="pp_empresa_texto" disabled readonly>
                    <select id="pp_id_empresa" class="oculto">
                        <option value="">-- Selecciona una empresa --</option>
                    </select>
                    <button type="button" id="pp_btn_crear_empresa" class="btn crear oculto">+ Crear Nueva Empresa</button>
                    <label for="pp_area">Área</label>
                    <input type="text" id="pp_area" disabled>
                    <label for="pp_programa">Programa</label>
                    <input type="text" id="pp_programa" disabled>
                    <label for="pp_estado">Estado</label>
                    <select id="pp_estado" disabled>
                        <option value="">-- Seleccionar --</option>
                        <option value="PENDIENTE">Pendiente</option>
                        <option value="EN_CURSO">En_Curso</option>
                        <option value="COMPLETADO">Completado</option>
                    </select>
                    <label for="pp_periodo_tipo">Periodo Tipo</label>
                    <input type="text" id="pp_periodo_tipo" disabled readonly>
                    <label for="pp_periodo_año">Periodo Año</label>
                    <input type="text" id="pp_periodo_año" disabled>
                    <label for="pp_fecha_inicio">Fecha Inicio</label>
                    <input type="date" id="pp_fecha_inicio" disabled>
                    <label for="pp_fecha_fin">Fecha Fin</label>
                    <input type="date" id="pp_fecha_fin" disabled>
                    <label for="pp_fecha_registro">Fecha Registro</label>
                    <input type="date" id="pp_fecha_registro" disabled readonly>
                    <label for="pp_fecha_modificacion">Fecha Modificación</label>
                    <input type="date" id="pp_fecha_modificacion" disabled readonly>
                </form>
                <!-- Botones Prácticas Profesionales -->
                <div class="form-actions" id="acciones_pp">
                    <button type="button" id="btn_editar_pp" class="btn editar">Editar</button>
                    <button type="button" id="btn_guardar_pp" class="btn guardar" style="display:none">Guardar</button>
                    <button type="button" id="btn_cancelar_pp" class="btn cancelar" style="display:none">Cancelar</button>
                </div>
            </div>

        </div><!-- fin .table -->

        <!-- TOAST -->
        <div id="toast-mensaje" class="toast oculto"></div>
    </div>

    <!-- ======MODAL NUEVA EMPRESA====== -->
    <div class="modal" id="modal_nueva_empresa">
        <div class="modal-contenido">
            <h2>Nueva Empresa</h2>
            <label for="nueva_empresa_nombre">Nombre</label>
            <input type="text" id="nueva_empresa_nombre">
            <label for="nueva_empresa_descripcion">Descripción</label>
            <textarea id="nueva_empresa_descripcion"></textarea>
            <label for="nueva_empresa_razon_social">Razón Social</label>
            <input type="text" id="nueva_empresa_razon_social">
            <label for="nueva_empresa_rfc">RFC</label>
            <input type="text" id="nueva_empresa_rfc">
            <label for="nueva_empresa_direccion">Dirección</label>
            <textarea id="nueva_empresa_direccion"></textarea>
            <label for="nueva_empresa_web">Sitio Web</label>
            <input type="url" id="nueva_empresa_web" placeholder="https://ejemplo.com">
            <div class="acciones-modal">
                <button type="button" class="btn cancelar" id="cerrar_modal_empresa">Cancelar</button>
                <button type="button" class="btn guardar" id="guardar_nueva_empresa">Guardar Empresa</button>
            </div>
        </div>
    </div>

    <!-- ======MODAL PRÁCTICAS PROFESIONALES====== -->
    <div class="modal" id="modal_practicas_profesionales" style="display:none">
        <div class="modal-contenido">
            <h2>Prácticas Profesionales</h2>
            <p>Has llegado al semestre <strong id="semestre_detectado"></strong>. ¿Deseas iniciar el registro de Prácticas Profesionales ahora?</p>
            <div class="acciones-modal">
                <button type="button" class="btn cancelar" id="btn_no_practicas">Después</button>
                <button type="button" class="btn guardar" id="btn_si_practicas">Sí, iniciar</button>
            </div>
        </div>
    </div>

    <script type="module" src="mostrar_contenido.js"></script>
    <script type="module" src="editar_guardar_perfil.js"></script>
    <script type="module" src="editar_guardar_act_alum.js"></script>
    <script type="module" src="menu.js"></script>
    <script type="module" src="../js/redireccion.js"></script>
</body>

</html>
