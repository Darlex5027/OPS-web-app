        </div>
        <div class="table">
            <form id="perfil_administrador">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre_administrador" name="nombre" placeholder="" disabled readonly >
                <label for="nombre">Apellido Paterno</label>
                <input type="text" id="apellido_paterno_administrador" name="nombre" placeholder="" disabled readonly>
                <label for="nombre">Apellido Materno</label>

                <input type="text" id="telefono_administrador" name="telefono" placeholder="" disabled>
                <label for="correo">Correo</label>
                <input type="email" id="correo_administrador" name="correo" placeholder="" disabled>
                <label for="carrera">Fecha de Registro</label>
                <input type="text" id="fecha_registro_administrador" name="carrera" placeholder="" disabled readonly>
            </form>
            <form id="perfil_alumno">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre_alumno" name="nombre" placeholder="" disabled readonly>
                <label for="apellido_p">Apellido Paterno</label>
                <input type="text" id="apellido_paterno_alumno" name="nombre" placeholder="" disabled readonly>
                <label for="apellido_m">Apellido Materno</label>
                <input type="text" id="apellido_materno_alumno" name="nombre" placeholder="" disabled readonly>
                <label for="carrera_nomnre">Carrera</label>
                <input type="text" id="id_carrera_alumno" name="nombre_carrera" placeholder="" disabled readonly>
                <label for="gru">Grupo</label>
                <input type="int" id="grupo_alumno" name="grupo" placeholder="" disabled>
                <label for="no_expediente">No.expediente</label>
                <input type="int" id="no_expediente_alumno" name="expediente" placeholder="" disabled readonly>
                <label for="horario">Horario</label>
                <input type="text" id="horario_alumno" name="horario" placeholder="" disabled>
                <label for="fecha_registro">Fecha de registro</label>
                <input type="text" id="fecha_registro_alumno" name="fecha_registro" placeholder="" disabled readonly>
            </form>
