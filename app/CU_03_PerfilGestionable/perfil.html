    <div class="main">
        <div class="header">
            <div></div>
            <h1>Perfil</h1>
            <div class="header-logo-right">
                <img src="../Imagenes/Logo.png" alt="Logo OPS">
            </div>
        </div>
        <div class="table">
            <form id="perfil_administrador">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre_administrador" name="nombre" placeholder="" disabled readonly>
                <label for="nombre">Apellido Paterno</label>
                <input type="text" id="apellido_paterno_administrador" name="nombre" placeholder="" disabled readonly>
                <label for="nombre">Apellido Materno</label>
                <input type="text" id="apellido_materno_administrador" name="nombre" placeholder="" disabled readonly>
                <label for="no_empleado">Carrera.Nombre</label>
                <input type="text" id="id_carrera_administrador" name="nombre_carrera" placeholder="" disabled readonly>
                <label for="telefono">Teléfono</label>
                <input type="text" id="telefono_administrador" name="telefono" placeholder="" disabled>
                <label for="correo">Correo</label>
                <input type="email" id="correo_administrador" name="correo" placeholder="" disabled>
                <label for="carrera">Fecha de Registro</label>
                <input type="text" id="fecha_registro_administrador" name="carrera" placeholder="" disabled readonly>
            </form>
            <form id="perfil_alumno">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre_alumno" name="nombre" placeholder="" disabled readonly>
                <label for="apellido_p">Apellido Paterno</label>
                <input type="text" id="apellido_paterno_alumno" name="nombre" placeholder="" disabled readonly>
                <label for="apellido_m">Apellido Materno</label>
                <input type="text" id="apellido_materno_alumno" name="nombre" placeholder="" disabled readonly>
                <label for="carrera_nomnre">Carrera</label>
                <input type="text" id="id_carrera_alumno" name="nombre_carrera" placeholder="" disabled readonly>
                <label for="gru">Grupo</label>
                <input type="int" id="grupo_alumno" name="grupo" placeholder="" disabled>
                <label for="no_expediente">No.expediente</label>
                <input type="int" id="no_expediente_alumno" name="expediente" placeholder="" disabled readonly>
                <label for="horario">Horario</label>
                <input type="text" id="horario_alumno" name="horario" placeholder="" disabled>
                <label for="fecha_registro">Fecha de registro</label>
                <input type="text" id="fecha_registro_alumno" name="fecha_registro" placeholder="" disabled readonly>
            </form>
            </form>
            <form id="perfil_actividades">
                <h2>Actividades de Servicio</h2>

                <input type="hidden" id="id_alumno_servicio_actividad">
                <input type="hidden" id="id_alumno_actividad">

                <label>Servicio</label>
                <input type="text" id="servicio_actividad" disabled readonly>

                <label>Empresa</label>
                <select id="id_empresa_actividad" disabled>
                    <option value="">-- Selecciona una empresa --</option>
                </select>

                <label>Área</label>
                <input type="text" id="area_actividad" disabled>

                <label>Programa</label>
                <input type="text" id="programa_actividad" disabled>

                <label>Estado</label>
                <select id="estado_actividad" disabled>
                    <option value="">-- Selecciona un estado --</option>
                </select>

                <label>Periodo</label>
                <select id="periodo_tipo_actividad" disabled>
                    <option value="">-- Selecciona un periodo --</option>
                </select>

                <label>Año del periodo</label>
                <input type="number" id="periodo_año_actividad" min="2000" max="2100" disabled>

                <label>Fecha de inicio</label>
                <input type="date" id="fecha_inicio_actividad" disabled>

                <label>Fecha de fin</label>
                <input type="date" id="fecha_fin_actividad" disabled>
            </form>
            <script src="mostrar_contenido.js" type="module"></script>
            <script src="../js/redireccion.js"></script>
        </div>
        <div class="form-actions">
            <button type="button" class="btn editar">Editar</button>
            <button type="button" class="btn guardar">Guardar</button>
        </div>
        <div id="toast-mensaje" class="toast oculto"></div>
    </div>
</body>

</html>
