<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Registro de usuario</title>

</head>

<body>

<h2>Registro de usuario</h2>

<form id="formRegistro">

<!-- ========================= -->
<!-- Tipo de cuenta -->
<!-- ========================= -->

<h3>Tipo de cuenta</h3>

<label>
<input type="radio" name="tipo_usuario" value="alumno" checked>
Alumno
</label>

<label>
<input type="radio" name="tipo_usuario" value="admin">
Administrador
</label>


<!-- ========================= -->
<!-- Datos de acceso -->
<!-- ========================= -->

<h3>Datos de acceso</h3>

<label>Matrícula</label>
<input
type="text"
id="matricula"
name="matricula"
maxlength="8"
placeholder="4 u 8 dígitos"
required
>

<label>Contraseña</label>
<input
type="password"
id="password"
name="password"
required
>

<label>Confirmar contraseña</label>
<input
type="password"
id="confirmar_password"
name="confirmar_password"
required
>


<!-- ========================= -->
<!-- Datos Alumno -->
<!-- ========================= -->

<div id="grupoAlumno">

<h3>Información del alumno</h3>

<label>Nombre</label>
<input type="text" id="nombre_alumno" name="nombre_alumno">

<label>Apellido paterno</label>
<input type="text" id="apellido_p_alumno" name="apellido_p_alumno">

<label>Apellido materno</label>
<input type="text" id="apellido_m_alumno" name="apellido_m_alumno">

<label>Carrera</label>
<select id="carrera_alumno" name="carrera_alumno">
<option value="">Cargando carreras...</option>
</select>

<label>No. de expediente</label>
<input type="text" id="expediente" name="expediente">

<label>Horario</label>
<input type="text" id="horario" name="horario">

<label>Email</label>
<input type="email" id="email_alumno" name="email_alumno">

<label>Teléfono celular</label>
<input type="text" id="telefono_alumno" name="telefono_alumno">

<label>Organización</label>
<input type="text" id="organizacion" name="organizacion">

</div>


<!-- ========================= -->
<!-- Datos Administrador -->
<!-- ========================= -->

<div id="grupoAdmin" hidden>

<h3>Información del administrador</h3>

<label>Nombre</label>
<input type="text" id="nombre_admin" name="nombre_admin">

<label>Apellido paterno</label>
<input type="text" id="apellido_p_admin" name="apellido_p_admin">

<label>Apellido materno</label>
<input type="text" id="apellido_m_admin" name="apellido_m_admin">

<label>Carrera a cargo</label>
<select id="carrera_admin" name="carrera_admin">
<option value="">Cargando carreras...</option>
</select>

<label>Teléfono</label>
<input type="text" id="telefono_admin" name="telefono_admin">

<label>Correo</label>
<input type="email" id="correo_admin" name="correo_admin">

</div>


<!-- ========================= -->
<!-- Botón -->
<!-- ========================= -->

<button type="submit">Registrarse</button>

</form>


<!-- ========================= -->
<!-- Mensajes -->
<!-- ========================= -->

<p id="mensaje"></p>

<p>
¿Ya tienes cuenta?
<a href="login.html">Inicia sesión</a>
</p>


<script src="js/registro.js"></script>

</body>

</html>
