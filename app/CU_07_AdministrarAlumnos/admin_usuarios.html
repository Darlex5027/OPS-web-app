<!--
Daniela Hernandez Hernandez
Fecha de creacion: 8 de abril del 2026
El archivo HTML de “Administrar alumnos” funciona como la interfaz principal del sistema.
Aquí es donde el usuario (por ejemplo, una administradora o maestra) puede ver la información 
de los alumnos. Contiene la estructura visual, como el menú lateral, el encabezado y la tabla 
donde se mostrarán los datos. Además, incluye los archivos de JavaScript que se encargan de la 
lógica del sistema y un contenedor para mostrar notificaciones tipo toast. En pocas palabras, 
este archivo representa la parte visual con la que interactúa el usuario.
-->

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8"> <!-- Soporte para caracteres especiales como ñ y tildes -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Adaptación a móviles -->
    <!-- Título que aparece en la pestaña del navegador -->
    <title>Administrar alumnos</title>
    <!-- Enlace al archivo CSS para estilos -->
    <link rel="stylesheet" href="../css/prueba.css">
</head>

<body>
    <!-- Barra lateral (menú de navegación) -->
    <div class="sidebar">
        <!-- Sección del perfil del usuario -->
        <div class="profile">
            <img src="../Imagenes/prueba.png" alt="perfil">
            <h3>Mtra. M. Guadalupe</h3>
        </div>
        <!-- Menú de opciones -->
        <div class="menu"></div>
    </div>
    <!-- Contenido principal de la página -->
    <div class="main">
        <!-- Encabezado superior -->
        <div class="header">
            <div></div><!-- Espacio vacío (puede ser para alineación) -->
            <!-- Título de la sección -->
            <h1>Administrar Alumnos</h1>
            <!-- Logo en la parte derecha -->
            <div class="header-logo-right">
                <img src="../Imagenes/Logo.png" alt="Logo OPS">
            </div>
        </div>
        <!-- Contenedor de la tabla -->
         <div id="div-coordinadores" class="table">
             <h2>Coordinadores pendientes</h2>
            <!-- Tabla para mostrar docentes -->
            <table border="1">
                <!-- Encabezados de la tabla -->
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Matricula</th>
                        <th>Carrera</th>
                        <th>Fecha de registro</th>
                        <th>Telefono</th>
                        <th>Correo</th>
                        <th>Accion</th>
                    </tr>
                </thead>
                <!-- Cuerpo de la tabla (se llena dinámicamente con JavaScript) -->
                <tbody id="tabla-coordinadores"></tbody>
            </table>
        </div>
        <div id="div-alumnos" class="table">
            <h2>Alumnos pendientes</h2>
            <!-- Tabla para mostrar alumnos -->
            <table border="1">
                <!-- Encabezados de la tabla -->
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Matricula</th>
                        <th>Carrera</th>
                        <th>Fecha de registro</th>
                        <th>Servicio</th>
                        <th>Accion</th>
                    </tr>
                </thead>
                <!-- Cuerpo de la tabla (se llena dinámicamente con JavaScript) -->
                <tbody id="tabla-alumnos"></tbody>
            </table>
        </div>
    </div>
    <!-- Scripts que manejan la lógica de la página -->
    <script src="../js/redireccion.js"></script>
     <!-- Script para aceptar alumnos -->
    <script type="module" src="aceptar_usuarios.js"></script>
    <!-- Script para rechazar alumnos -->
    <script type="module" src="rechazar_usuarios.js"></script>
    <!-- Script para obtener y mostrar alumnos -->
    <script type="module" src="admin_usuarios.js"></script>
    <!-- Contenedor para mostrar mensajes tipo "toast" (notificaciones emergentes) -->
    <div id="toast-mensaje" class="toast oculto"></div>
</body>

</html>
