                servicio, periodo y fecha de expiración.
-->
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8"> <!-- Soporte para caracteres especiales como ñ y tildes -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Adaptación a móviles -->
    <title>Encuestas</title>
    <!-- Enlace al archivo CSS para estilos -->
    <link rel="stylesheet" href="../css/prueba.css">
</head>

<body>
    <!-- Barra lateral (menú de navegación) -->
    <div class="sidebar">
        <!-- Sección del perfil del usuario -->
        <div class="profile">
            <img src="../Imagenes/prueba.png" alt="perfil">
            <h3>Mtra. M. Guadalupe</h3>
        </div>
        <!-- Menú de opciones -->
        <div class="menu"></div>
    </div>
    <!-- Contenido principal de la página -->
    <div class="main">
        <!-- Encabezado superior -->
        <div class="header">
            <div></div><!-- Espacio vacío (puede ser para alineación) -->
            <!-- Título de la sección -->
            <h1>Encuestas</h1>
            <!-- Logo en la parte derecha -->
            <div class="header-logo-right">
                <img src="../Imagenes/Logo.png" alt="Logo OPS">
            </div>
        </div>
        <form>
            <label>Nombre</label>
            <input type="text" id="inputNombre">
            <label>Descripción </label>
            <input type="text" id="inputDescripcion">
            <div id="elContenedorServicio">
                <label>Servicio: </label>
                <select id="selectServicio">
                    <option value="">-- Seleccionar... --</option>
                </select>
            </div>
            <label>Activo: </label>
            <select id="selectActivo">
                <option value="">-- Seleccionar --</option>
                <option value="1">Sí</option>
                <option value="0">No</option>
            </select>

            <label>Dirigido a: </label>
            <select id="selectContestador">
                <option value="">-- Seleccionar --</option>
                <option value="1">Docentes como alumnos</option>
                <option value="0">Alumnos</option>
            </select>

            <label>Tipo de periodo</label>
            <select id="selectPeriodoTipo">
                <option value="">-- Seleccionar --</option>
                <option value="primavera">Primavera </option>
                <option value="otoño">Otoño</option>
            </select>
            <label>Año</label>
            <input type="text" id="inputPeriodoAnio" maxlength="4" pattern="[0-9]{4}">

            <label for="inputFechaFin">Fecha de expiracion: </label>
            <input type="date" id="inputFechaFin" placeholder="Fecha de fin">
            <button type="button" onclick="guardarEncuesta()">Guardar</button>
            <button type="button" onclick="window.location.href='encuestas_lista.html'">Cancelar</button>
        </form>
    </div>
    <script type="module" src="encuesta_form.js"></script>
    <!-- Scripts que manejan la lógica de la página -->
    <script type="module" src="../js/redireccion.js"></script>
    <!-- Contenedor para mostrar mensajes tipo "toast" (notificaciones emergentes) -->
    <div id="toast-mensaje" class="toast oculto"></div>
</body>

</html>
