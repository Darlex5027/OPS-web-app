  Descripción : Vista que muestra las preguntas asociadas a una encuesta,
                con acceso a edición según el tipo de usuario y si la encuesta tiene respuestas.
-->
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8"> <!-- Soporte para caracteres especiales como ñ y tildes -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Adaptación a móviles -->
    <title>Encuestas</title>
    <!-- Enlace al archivo CSS para estilos -->
    <link rel="stylesheet" href="../css/prueba.css">
</head>

<body>
    <!-- Barra lateral (menú de navegación) -->
    <div class="sidebar">
        <!-- Sección del perfil del usuario -->
        <div class="profile">
            <img src="../Imagenes/prueba.png" alt="perfil">
            <h3>Mtra. M. Guadalupe</h3>
        </div>
        <!-- Menú de opciones -->
        <div class="menu"></div>
    </div>
    <!-- Contenido principal de la página -->
    <div class="main">
        <!-- Encabezado superior -->
        <div class="header">
            <div></div><!-- Espacio vacío (puede ser para alineación) -->
            <!-- Título de la sección -->
            <h1>Encuestas</h1>
            <!-- Logo en la parte derecha -->
            <div class="header-logo-right">
                <img src="../Imagenes/Logo.png" alt="Logo OPS">
            </div>
        </div>
        <button type="button" id="btnNuevaPregunta">Nueva Pregunta</button>
        <table border="1">
            <thead>
                <tr>
                    <th>Sección</th>
                    <th>Orden</th>
                    <th>Pregunta</th>
                    <th>Tipo respuesta</th>
                    <th>Obligatoria</th>
                    <th>Activo</th>
                    <th id="elAccion">Acción</th>
                </tr>
            </thead>
            <tbody id="tbodyPreguntas"></tbody>
        </table>
    </div>
    <script type="module" src="preguntas_lista.js"></script>
    <!-- Scripts que manejan la lógica de la página -->
    <script type="module" src="../js/redireccion.js"></script>
    <!-- Contenedor para mostrar mensajes tipo "toast" (notificaciones emergentes) -->
    <div id="toast-mensaje" class="toast oculto"></div>
</body>

</html>
